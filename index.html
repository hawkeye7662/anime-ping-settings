<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Ping Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card hero">
        <p class="eyebrow">Today’s Anime</p>
        <h1>Ping Settings</h1>
        <p class="muted">
          Admin-only dashboard for updating everyone’s morning summary and
          release ping preferences.
        </p>
      </section>

      <section class="card">
        <h2>Admin login</h2>
        <p id="auth-status" class="muted">Checking session…</p>
        <form id="login-form" class="login-form">
          <label class="field">
            <span>Username</span>
            <input id="username" name="username" type="text" autocomplete="username" />
          </label>
          <label class="field">
            <span>Password</span>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
            />
          </label>
          <div class="actions">
            <button id="login-button" class="button primary" type="submit">
              Sign in
            </button>
            <button id="logout-button" class="button" type="button" hidden>
              Sign out
            </button>
          </div>
        </form>
      </section>

      <section id="settings-card" class="card" hidden>
        <h2>Notification preferences</h2>
        <p class="muted">
          Leave a threshold blank to always allow pings for that notification
          type.
        </p>

        <form id="settings-form">
          <div id="user-settings-list" class="user-settings-list"></div>

          <div class="actions">
            <button id="save-button" class="button primary" type="submit">
              Save settings
            </button>
          </div>
        </form>

        <p id="save-status" class="muted" role="status"></p>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
